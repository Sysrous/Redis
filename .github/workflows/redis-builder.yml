# .github/workflows/redis-builder.yml

name: Build Redis Binaries (Official Method)

on:
  workflow_dispatch:
    inputs:
      redis_version:
        description: 'Redis Version to Build (e.g., 8.4.2)'
        required: true
        # 默认使用您确认的 8.4.2 版本
        default: '8.4.2'
  push:
    branches: [ "main" ]

jobs:
  build-and-package:
    name: Build on ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu-24.04
            os: ubuntu-24.04
          - name: Ubuntu-22.04
            os: ubuntu-22.04
          - name: Ubuntu-20.04
            os: ubuntu-20.04
          - name: Debian-12
            os: ubuntu-latest
            container: debian:12
          - name: Debian-11
            os: ubuntu-latest
            container: debian:11

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Install Build Dependencies (as per Official Docs)
        run: |
          set -e
          apt-get update -y
          # --- 关键变更 1: 安装所有官方文档推荐的依赖 ---
          apt-get install -y --no-install-recommends \
            build-essential \
            tcl \
            libssl-dev \
            libsystemd-dev \
            pkg-config \
            wget \
            unzip \
            curl \
            uuid-dev \
            libjemalloc-dev # Redis 推荐的内存分配器

      - name: Download, Compile, and Package Redis
        run: |
          set -e
          
          REDIS_VERSION=${{ github.event.inputs.redis_version || '8.4.2' }}
          echo ">>> Starting build for Redis Version: $REDIS_VERSION"

          echo ">>> Step 1: Downloading source code..."
          # --- 关键变更 2: 使用更标准的 .tar.gz 格式 ---
          wget "https://github.com/redis/redis/archive/refs/tags/${REDIS_VERSION}.tar.gz" -O redis.tar.gz
          
          mkdir -p /tmp/redis-src /tmp/redis-package

          echo ">>> Step 2: Extracting source code..."
          tar -xzf redis.tar.gz -C /tmp/redis-src --strip-components=1
          cd /tmp/redis-src

          echo ">>> Step 3: Compiling Redis (Official Flags)..."
          # 确保编译环境干净
          make distclean
          # --- 关键变更 3: 使用官方推荐的编译选项 MALLOC=jemalloc ---
          make BUILD_TLS=yes MALLOC=jemalloc
          
          echo ">>> Step 4: Installing to staging directory..."
          make PREFIX=/tmp/redis-package install
          
          echo ">>> Step 5: Packaging binaries..."
          cd /tmp/redis-package
          tar -czvf "/github/workspace/redis-${REDIS_VERSION}-binaries-${{ matrix.name }}.tar.gz" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: redis-binaries-${{ matrix.name }}
          path: /github/workspace/redis-*.tar.gz
