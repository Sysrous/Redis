# .github/workflows/redis-builder.yml

name: Build Redis Binaries

on:
  # 允许手动触发此工作流
  workflow_dispatch:
    inputs:
      redis_version:
        description: 'Redis Version to Build'
        required: true
        default: '8.6.2' # 默认使用您指定的版本
  # 当 main 分支有推送时也自动触发
  push:
    branches: [ "main" ]

jobs:
  build-and-package:
    # 任务名称
    name: Build on ${{ matrix.name }}
    # 使用矩阵策略，在多个操作系统上并行执行
    strategy:
      matrix:
        include:
          # --- Ubuntu Runners ---
          - name: Ubuntu-24.04
            os: ubuntu-24.04
          - name: Ubuntu-22.04
            os: ubuntu-22.04
          - name: Ubuntu-20.04
            os: ubuntu-20.04
          # --- Debian (via Docker on Ubuntu Runner) ---
          # GitHub 没有原生的 Debian runner, 我们用 Docker 来精确模拟
          - name: Debian-12
            os: ubuntu-latest
            container: debian:12
          - name: Debian-11
            os: ubuntu-latest
            container: debian:11
          # - name: Debian-10 # Debian 10 依赖可能过旧, 按需启用
          #   os: ubuntu-latest
          #   container: debian:10

    # 运行环境
    runs-on: ${{ matrix.os }}
    # 如果定义了 container, 则在容器内运行
    container: ${{ matrix.container }}

    steps:
      # 步骤 1: 安装编译依赖
      - name: Install Build Dependencies
        run: |
          apt-get update -y && apt-get install -y --no-install-recommends \
          gcc g++ make tcl wget libssl-dev pkg-config ca-certificates

      # 步骤 2: 下载并编译 Redis
      - name: Download and Compile Redis
        run: |
          # 从输入或默认值获取版本号
          REDIS_VERSION=${{ github.event.inputs.redis_version || '8.6.2' }}
          echo "Building Redis Version: $REDIS_VERSION"

          # 下载源码
          wget "https://github.com/redis/redis/archive/refs/tags/${REDIS_VERSION}.tar.gz" -O redis.tar.gz
          mkdir /tmp/redis-src
          tar -xzf redis.tar.gz -C /tmp/redis-src --strip-components=1
          cd /tmp/redis-src

          # 编译
          make

          # 创建一个用于打包的临时目录
          mkdir /tmp/redis-package

          # 将核心的二进制文件复制到打包目录
          cp src/redis-server /tmp/redis-package/
          cp src/redis-cli /tmp/redis-package/
          cp src/redis-benchmark /tmp/redis-package/
          cp src/redis-sentinel /tmp/redis-package/
          
          # 将配置文件模板也放进去
          cp redis.conf /tmp/redis-package/redis.conf.example

      # 步骤 3: 将编译产物打包成 tar.gz
      - name: Package Binaries
        run: |
          cd /tmp/redis-package
          # 打包成 tar.gz 文件
          tar -czvf "redis-binaries-${{ matrix.name }}.tar.gz" .

      # 步骤 4: 上传编译产物 (Artifact)
      - name: Upload Artifact
        # 使用官方的 artifact上传 action
        uses: actions/upload-artifact@v4
        with:
          # artifact 的名字
          name: redis-binaries-${{ matrix.name }}
          # 要上传的文件路径
          path: /tmp/redis-package/redis-binaries-${{ matrix.name }}.tar.gz
